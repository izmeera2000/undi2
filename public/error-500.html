<body>
  <div class="error-page">
    <div class="error-wrapper">
      <div class="error-visual">
        <div class="error-server">
          <div class="server-icon">
            <i class="bi bi-hdd-stack"></i>
          </div>
          <div class="server-status">
            <span class="status-dot"></span>
            <span class="status-dot"></span>
            <span class="status-dot error"></span>
          </div>
          <div class="server-waves">
            <div class="wave wave-1"></div>
            <div class="wave wave-2"></div>
          </div>
        </div>
      </div>

      <div class="error-content">
        <span class="error-badge danger">
          <i class="bi bi-exclamation-octagon me-1"></i> Server Error
        </span>
        <h1 class="error-title">Something went wrong</h1>
        <p class="error-description">
          We're experiencing some technical difficulties. Our team has been
          automatically notified and is working to fix the issue.
        </p>

        <div class="error-status-card">
          <div class="error-status-header">
            <i class="bi bi-activity"></i>
            <span>System Status</span>
          </div>
          <div class="error-status-items">
            <div class="error-status-item">
              <span class="status-name">API Services</span>
              <span class="status-indicator operational">Operational</span>
            </div>
            <div class="error-status-item">
              <span class="status-name">Database</span>
              <span class="status-indicator operational">Operational</span>
            </div>
            <div class="error-status-item">
              <span class="status-name">Application Server</span>
              <span class="status-indicator degraded">Degraded</span>
            </div>
          </div>
        </div>

        <div class="error-actions">
          <button class="btn btn-primary" onclick="location.reload()">
            <i class="bi bi-arrow-clockwise me-2"></i> Try Again
          </button>
          <a href="index.html" class="btn btn-outline-secondary">
            <i class="bi bi-house me-2"></i> Go to Homepage
          </a>
        </div>

        <div class="error-reference">
          <p>Error Reference: <code>ERR_500_<span id="errorTimestamp"></span></code></p>
          <script>
            document.getElementById('errorTimestamp').textContent = Date.now();
          </script>
        </div>
      </div>
    </div>
  </div>

  <!-- Vendor JS Files -->
  <script src="../../vendors/bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
