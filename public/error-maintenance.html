<body>
  <div class="maintenance-page">
    <div class="maintenance-wrapper">
      <div class="maintenance-header">
        <a href="index.html" class="maintenance-logo">
          <img src="assets/img/logo.webp" alt="ModernAdmin">
        </a>
      </div>

      <div class="maintenance-visual">
        <div class="maintenance-gears">
          <div class="gear gear-large">
            <i class="bi bi-gear-fill"></i>
          </div>
          <div class="gear gear-small">
            <i class="bi bi-gear-fill"></i>
          </div>
        </div>
        <div class="maintenance-progress">
          <div class="progress-bar-animated"></div>
        </div>
      </div>

      <div class="maintenance-content">
        <h1 class="maintenance-title">We're improving things</h1>
        <p class="maintenance-description">
          We're performing scheduled maintenance to improve your experience.
          We'll be back online shortly.
        </p>

        <div class="maintenance-timeline">
          <div class="timeline-item completed">
            <div class="timeline-marker"></div>
            <div class="timeline-content">
              <span class="timeline-label">Started</span>
              <span class="timeline-time">10:00 AM</span>
            </div>
          </div>
          <div class="timeline-item current">
            <div class="timeline-marker"></div>
            <div class="timeline-content">
              <span class="timeline-label">In Progress</span>
              <span class="timeline-time">Database Migration</span>
            </div>
          </div>
          <div class="timeline-item">
            <div class="timeline-marker"></div>
            <div class="timeline-content">
              <span class="timeline-label">Expected Completion</span>
              <span class="timeline-time">~2:00 PM</span>
            </div>
          </div>
        </div>

        <div class="maintenance-notify">
          <p>Get notified when we're back:</p>
          <form class="maintenance-form">
            <input type="email" placeholder="Enter your email" required>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-bell"></i>
            </button>
          </form>
        </div>

        <div class="maintenance-social">
          <p>Follow us for updates:</p>
          <div class="social-links">
            <a href="#" class="social-link" title="Twitter">
              <i class="bi bi-twitter-x"></i>
            </a>
            <a href="#" class="social-link" title="Facebook">
              <i class="bi bi-facebook"></i>
            </a>
            <a href="#" class="social-link" title="Instagram">
              <i class="bi bi-instagram"></i>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Vendor JS Files -->
  <script src="../../vendors/bootstrap/js/bootstrap.bundle.min.js"></script>
